<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Builders Digest</title>
<style>
:root {
  --bg: #0d1117;
  --bg-sidebar: #161b22;
  --text: #c9d1d9;
  --text-muted: #8b949e;
  --link: #58a6ff;
  --border: #30363d;
  --code-bg: #1c2128;
  --h-color: #f0f6fc;
}
* { margin:0; padding:0; box-sizing:border-box }
body { font: 16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh }
nav { width:260px; background:var(--bg-sidebar); border-right:1px solid var(--border); padding: 20px 0; position:sticky; top:0; height:100vh; overflow-y:auto; flex-shrink:0 }
nav h1 { font-size:18px; padding:0 20px 16px; color:var(--h-color); border-bottom:1px solid var(--border); margin-bottom:12px }
nav a { display:block; padding:4px 20px; color:var(--text-muted); text-decoration:none; font-size:14px; transition:color .15s }
nav a:hover, nav a.active { color:var(--link) }
nav .section { color:var(--text-muted); font-size:12px; padding:16px 20px 4px; text-transform:uppercase; letter-spacing:.5px }
main { flex:1; padding:40px 60px; max-width:900px; overflow-x:hidden }
main h1 { font-size:28px; color:var(--h-color); margin-bottom:8px; padding-bottom:12px; border-bottom:1px solid var(--border) }
main h2 { font-size:20px; color:var(--h-color); margin:32px 0 12px }
main h3 { font-size:16px; color:var(--h-color); margin:24px 0 8px }
main h4 { color:var(--text-muted); margin:16px 0 6px }
main a { color:var(--link); text-decoration:none }
main a:hover { text-decoration:underline }
main p { margin:8px 0 }
main ul, main ol { padding-left:24px; margin:8px 0 }
main li { margin:4px 0 }
main code { background:var(--code-bg); padding:2px 6px; border-radius:4px; font-size:13px }
main pre { background:var(--code-bg); padding:16px; border-radius:6px; overflow-x:auto; margin:12px 0 }
main pre code { background:none; padding:0 }
main hr { border:none; border-top:1px solid var(--border); margin:32px 0 }
main blockquote { border-left:3px solid var(--link); padding-left:16px; color:var(--text-muted); margin:12px 0 }
main strong { color:var(--h-color) }
main img { max-width:100% }
main table { border-collapse:collapse; width:100%; margin:12px 0 }
main th, main td { border:1px solid var(--border); padding:8px 12px; text-align:left }
main th { background:var(--bg-sidebar) }
.loader { color:var(--text-muted); text-align:center; padding:60px 0 }
@media (max-width:768px) {
  body { flex-direction:column }
  nav { width:100%; height:auto; position:static; border-right:none; border-bottom:1px solid var(--border) }
  main { padding:24px 20px }
}
</style>
</head>
<body>
<nav>
  <h1>🤖 AI Builders Digest</h1>
  <div class="section">📅 日报存档</div>
  <a href="#" data-file="README.md" onclick="loadFile('README.md');return false">🏠 首页</a>
  <a href="#" data-file="2026-06-04.md" onclick="loadFile('2026-06-04.md');return false">2026-06-04</a>
</nav>
<main id="content"><div class="loader">Loading...</div></main>

<script src="marked.js"></script>
<script>
const content = document.getElementById('content');
const sidebar = document.getElementById('sidebar-list');

async function loadFile(path) {
  content.innerHTML = '<div class="loader">Loading...</div>';
  try {
    const resp = await fetch(path);
    if (!resp.ok) { content.innerHTML = '<h2>File not found: '+path+'</h2>'; return; }
    const md = await resp.text();
    content.innerHTML = marked.parse(md);
    window.scrollTo(0,0);
    document.title = (path.replace('.md','') + ' - AI Builders Digest');
    // update active nav link
    document.querySelectorAll('nav a[data-file]').forEach(a => {
      a.classList.toggle('active', a.dataset.file === path);
    });
  } catch(e) {
    content.innerHTML = '<h2>Error loading page</h2><p>'+e.message+'</p>';
  }
}

// Route based on hash
function route() {
  const hash = location.hash.slice(1);
  const file = hash || 'README.md';
  loadFile(file);
}
window.addEventListener('hashchange', route);

// marked.js is bundled locally — zero CDN dependencies
window.addEventListener('DOMContentLoaded', route);
</script>
</body>
</html>
