<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AI Builders Digest</title>

  <!-- Docsify v4 Vue theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">

  <style>
    /* Dark mode overrides for the vue theme */
    body, .sidebar, .content, .markdown-section {
      background: #0d1117 !important;
      color: #c9d1d9 !important;
    }
    .sidebar {
      background: #161b22 !important;
    }
    .sidebar-toggle {
      background: transparent;
    }
    .sidebar-nav li > a {
      color: #8b949e;
    }
    .sidebar-nav li.active > a {
      color: #f0f6fc !important;
    }
    .markdown-section h1, .markdown-section h2, .markdown-section h3 {
      color: #f0f6fc;
    }
    .markdown-section a {
      color: #58a6ff;
    }
    .markdown-section code {
      background: #1c2128;
      color: #c9d1d9;
    }
    .search input, .search .input-wrap {
      background: #0d1117;
      border-color: #30363d;
    }
    .search input {
      color: #c9d1d9;
    }
    hr {
      border-color: #30363d;
    }
    .github-corner svg {
      fill: #161b22;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'AI Builders Digest',
      logo: '🤖',
      loadSidebar: '_sidebar.md',
      auto2top: true,
      subMaxLevel: 2,
      search: 'auto',
      repo: 'https://github.com/shadowfish07/ai-builders-digest'
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
